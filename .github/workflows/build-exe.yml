name: Build Windows EXE

on:
  workflow_dispatch:          # manual trigger from GitHub UI
  push:
    tags:
      - 'v*'                  # also fires on version tags

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: shopkeeper_app/requirements-client.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r shopkeeper_app/requirements-client.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --clean --noconfirm `
            --distpath build/output/dist `
            --workpath build/output/build `
            build/config/ezprint_agent.spec

      - name: Verify EXE was created
        run: |
          $exe = "build/output/dist/EzPrintAgent.exe"
          if (!(Test-Path $exe)) { Write-Error "EXE not found at $exe"; exit 1 }
          $size = (Get-Item $exe).Length / 1MB
          Write-Host ("EzPrintAgent.exe built successfully: {0:N2} MB" -f $size)

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: EzPrintAgent-Windows
          path: build/output/dist/EzPrintAgent.exe
          retention-days: 30
