<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EzPrint Admin</title>
    <link rel="stylesheet" href="{{ url_for('admin.static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" defer></script>
</head>
<body class="admin-body">
    <div class="layout">
        <aside class="sidebar">
            <div class="logo">EzPrint Admin</div>
            <nav>
                <a href="{{ url_for('admin.dashboard') }}" class="nav-item {% if request.endpoint == 'admin.dashboard' %}active{% endif %}">Dashboard</a>
                <a href="{{ url_for('admin.shops') }}" class="nav-item {% if request.endpoint == 'admin.shops' %}active{% endif %}">Shops</a>
                <a href="{{ url_for('admin.shopkeepers') }}" class="nav-item {% if request.endpoint == 'admin.shopkeepers' %}active{% endif %}">Shopkeepers</a>
                <a href="{{ url_for('admin.jobs') }}" class="nav-item {% if request.endpoint == 'admin.jobs' %}active{% endif %}">Print Jobs</a>
                <a href="{{ url_for('admin.revenue') }}" class="nav-item {% if request.endpoint == 'admin.revenue' %}active{% endif %}">Revenue</a>
                <a href="{{ url_for('admin.printers') }}" class="nav-item {% if request.endpoint == 'admin.printers' %}active{% endif %}">Printers</a>
                <a href="{{ url_for('admin.settings') }}" class="nav-item {% if request.endpoint == 'admin.settings' %}active{% endif %}">Settings</a>
            </nav>
        </aside>

        <main class="main">
            <header class="topbar">
                <div class="topbar-left">
                    <div class="date-range">
                        <span>Overview</span>
                        <small>{{ (admin_user or 'Admin') }}</small>
                    </div>
                </div>
                <div class="topbar-right">
                    <div class="pill">{{ admin_user or 'Admin' }}</div>
                    <a class="link" href="{{ url_for('admin.logout') }}">Logout</a>
                </div>
            </header>

            <section class="content">
                {% block content %}{% endblock %}
            </section>
        </main>
    </div>
</body>
</html>
